<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nanobot</title>
    <style>
        /* 基础样式重置 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        /* 布局 */
        .h-screen { height: 100vh; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .flex-1 { flex: 1; }
        .overflow-hidden { overflow: hidden; }
        .overflow-y-auto { overflow-y: auto; }

        /* 侧边栏 */
        .w-64 { width: 256px; }
        .bg-white { background-color: #ffffff; }
        .border-r { border-right: 1px solid #e5e7eb; }
        .border-gray-200 { border-color: #e5e7eb; }
        .p-4 { padding: 16px; }
        .p-3 { padding: 12px; }
        .p-2 { padding: 8px; }
        .px-2 { padding-left: 8px; padding-right: 8px; }
        .py-0-5 { padding-top: 2px; padding-bottom: 2px; }
        .border-b { border-bottom: 1px solid #e5e7eb; }
        .border-t { border-top: 1px solid #e5e7eb; }
        .text-xl { font-size: 20px; line-height: 28px; }
        .font-bold { font-weight: 700; }
        .mt-3 { margin-top: 12px; }
        .w-full { width: 100%; }
        .bg-gray-100 { background-color: #f3f4f6; }
        .hover\:bg-gray-200:hover { background-color: #e5e7eb; }
        .rounded { border-radius: 6px; }
        .px-3 { padding-left: 12px; padding-right: 12px; }
        .py-2 { padding-top: 8px; padding-bottom: 8px; }
        .text-sm { font-size: 14px; line-height: 20px; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .gap-2 { gap: 8px; }
        .cursor-pointer { cursor: pointer; }

        /* 会话列表 */
        .text-center { text-align: center; }
        .text-gray-500 { color: #6b7280; }
        .text-xs { font-size: 12px; line-height: 16px; }
        .mt-4 { margin-top: 16px; }
        .mb-1 { margin-bottom: 4px; }
        .hover\:bg-gray-100:hover { background-color: #f3f4f6; }
        .bg-blue-50 { background-color: #eff6ff; }
        .text-blue-600 { color: #2563eb; }
        .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .flex-1 { flex: 1; }
        .min-w-0 { min-width: 0; }
        .opacity-0 { opacity: 0; }
        .group-hover\:opacity-100:hover { opacity: 1; }
        .text-gray-400 { color: #9ca3af; }
        .hover\:text-red-500:hover { color: #ef4444; }
        .p-1 { padding: 4px; }
        .transition-opacity { transition: opacity 0.15s; }

        /* 主区域 */
        .bg-gray-50 { background-color: #f9fafb; }
        .justify-between { justify-content: space-between; }
        .text-lg { font-size: 18px; line-height: 28px; }
        .font-semibold { font-weight: 600; }
        .gap-2 { gap: 8px; }
        .text-gray-500 { color: #6b7280; }
        .hover\:text-red-500:hover { color: #ef4444; }
        .disabled { opacity: 0.5; cursor: not-allowed; }

        /* 消息区域 */
        .p-6 { padding: 24px; }
        .h-full { height: 100%; }
        .text-4xl { font-size: 36px; line-height: 40px; }
        .mb-4 { margin-bottom: 16px; }
        .text-2xl { font-size: 24px; line-height: 32px; }
        .mb-2 { margin-bottom: 8px; }
        .max-w-5xl { max-width: 1024px; }
        .mx-auto { margin-left: auto; margin-right: auto; }
        .hidden { display: none; }

        /* 消息气泡 */
        .items-start { align-items: flex-start; }
        .gap-3 { gap: 12px; }
        .mb-6 { margin-bottom: 24px; }
        .w-8 { width: 32px; }
        .h-8 { height: 32px; }
        .rounded-full { border-radius: 9999px; }
        .bg-green-600 { background-color: #16a34a; }
        .bg-blue-600 { background-color: #2563eb; }
        .shrink-0 { flex-shrink: 0; }
        .text-white { color: #ffffff; }
        .bg-blue-50 { background-color: #eff6ff; }
        .rounded-lg { border-radius: 8px; }
        .rounded-tr-none { border-top-right-radius: 0; }
        .rounded-tl-none { border-top-left-radius: 0; }
        .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
        .p-4 { padding: 16px; }
        .max-w-\[90\%\] { max-width: 90%; }
        .whitespace-pre-wrap { white-space: pre-wrap; }

        /* Prose 样式 (Markdown) */
        .prose { max-width: none; }
        .prose pre { background-color: #f3f4f6; padding: 12px; border-radius: 6px; overflow-x: auto; }
        .prose code { background-color: #f3f4f6; padding: 2px 8px; border-radius: 4px; font-size: 14px; }
        .prose pre code { background-color: transparent; padding: 0; }
        .prose ul, .prose ol { padding-left: 24px; margin-top: 8px; margin-bottom: 8px; }
        .prose li { margin-top: 4px; margin-bottom: 4px; }
        .prose p { margin-top: 8px; margin-bottom: 8px; }
        .prose h1, .prose h2, .prose h3 { margin-top: 16px; margin-bottom: 8px; font-weight: 600; }
        .prose h1 { font-size: 24px; }
        .prose h2 { font-size: 20px; }
        .prose h3 { font-size: 18px; }
        .prose blockquote { border-left: 4px solid #3b82f6; padding-left: 16px; color: #6b7280; margin: 8px 0; }
        .prose a { color: #3b82f6; text-decoration: underline; }
        .prose table { width: 100%; border-collapse: collapse; margin: 8px 0; }
        .prose th, .prose td { border: 1px solid #e5e7eb; padding: 8px; }
        .prose th { background-color: #f9fafb; }

        /* 输入区域 */
        .border { border: 1px solid #e5e7eb; }
        .px-4 { padding-left: 16px; padding-right: 16px; }
        .py-3 { padding-top: 12px; padding-bottom: 12px; }
        .pr-12 { padding-right: 48px; }
        .focus\:outline-none:focus { outline: none; }
        .focus\:ring-2:focus { box-shadow: 0 0 0 2px #3b82f6; }
        .focus\:ring-blue-500:focus { box-shadow: 0 0 0 2px #3b82f6; }
        .resize-none { resize: none; }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .right-3 { right: 12px; }
        .bottom-3 { bottom: 12px; }
        .bg-blue-600 { background-color: #2563eb; }
        .hover\:bg-blue-700:hover { background-color: #1d4ed8; }
        .mt-2 { margin-top: 8px; }
        .justify-between { justify-content: space-between; }
        .text-green-500 { color: #22c55e; }
        .text-yellow-500 { color: #eab308; }
        .text-red-500 { color: #ef4444; }

        /* 打字动画 */
        .typing-animation span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #6b7280;
            margin: 0 2px;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-animation span:nth-child(1) { animation-delay: -0.32s; }
        .typing-animation span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden">
    <!-- 侧边栏 -->
    <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
        <div class="p-4 border-b">
            <h1 class="text-xl font-bold">🤖 nanobot</h1>
            <button id="new-chat" class="w-full mt-3 bg-gray-100 hover:bg-gray-200 rounded px-3 py-2 text-sm flex items-center justify-center gap-2">
                <span>[+]</span> 新建对话
            </button>
        </div>
        <div id="session-list" class="flex-1 overflow-y-auto p-2">
            <div class="text-center text-gray-500 text-sm mt-4">加载中...</div>
        </div>
        <div class="p-3 border-t text-xs text-gray-500">
            <div>用户: <span id="user-id"></span></div>
            <div>部门: <span id="dept-name"></span></div>
        </div>
    </div>

    <!-- 主区域 -->
    <div class="flex-1 flex flex-col bg-gray-50">
        <div class="p-4 bg-white border-b flex justify-between items-center">
            <h2 id="session-title" class="text-lg font-semibold"></h2>
            <div class="flex gap-2">
                <button id="clear-chat" class="text-gray-500 hover:text-red-500 p-2 disabled" title="清空对话" disabled>
                    <span>[×]</span>
                </button>
            </div>
        </div>

        <!-- 消息区域 -->
        <div id="message-container" class="flex-1 overflow-y-auto p-6">
            <div id="empty-state" class="h-full flex flex-col items-center justify-center">
                <div class="text-4xl mb-4">🤖</div>
                <h2 class="text-2xl font-semibold mb-2">有什么我能帮你的吗？</h2>
                <p class="text-gray-500">输入问题，我会为你提供专业的解答</p>
            </div>
            <div id="message-list" class="max-w-5xl mx-auto hidden"></div>
        </div>

        <!-- 输入区域 -->
        <div class="p-4 bg-white border-t">
            <div class="max-w-5xl mx-auto relative">
                <textarea
                    id="message-input"
                    class="w-full border rounded-lg px-4 py-3 pr-12 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                    placeholder="输入消息... (按Enter发送，Shift+Enter换行)"
                    rows="3"
                ></textarea>
                <button
                    id="send-btn"
                    class="absolute right-3 bottom-3 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded"
                >
                    <span>[→]</span>
                </button>
            </div>
            <div class="max-w-5xl mx-auto mt-2 text-xs text-gray-500 flex justify-between">
                <span id="status">
                    <span style="color:#22c55e;">●</span> 已连接
                </span>
                <span>支持Markdown语法</span>
            </div>
        </div>
    </div>

    <script>
        // marked.js - 精简版 Markdown 解析器 (内联版本)
        // 简单的 Markdown 解析，不需要外部依赖
        function simpleMarkedParse(text) {
            if (!text) return '';
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 代码块
            html = html.replace(/```([\s\S]*?)```/g, function(match, code) {
                return '<pre><code>' + code + '</code></pre>';
            });

            // 行内代码
            html = html.replace(/`([^`]+)`/g, function(match, code) {
                return '<code>' + code + '</code>';
            });

            // 标题
            html = html.replace(/^### (.*$)/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gm, '<h1>$1</h1>');

            // 粗体和斜体
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 链接
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // 列表
            html = html.replace(/^\- (.*$)/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');

            // 段落
            html = html.replace(/\n\n/g, '</p><p>');
            html = '<p>' + html + '</p>';

            return html;
        }

        // 使用简单的解析器，如果有完整版 marked 则用完整版
        const marked = {
            parse: function(text) {
                if (typeof window.marked !== 'undefined' && window.marked.parse) {
                    return window.marked.parse(text);
                }
                return simpleMarkedParse(text);
            }
        };

        // 获取参数
        const params = new URLSearchParams(window.location.search);
        const empId = params.get('empId');
        const deptname = params.get('deptname') || '未知部门';

        if (!empId) {
            alert('缺少empId参数');
            throw new Error('Missing empId');
        }

        // 初始化显示
        document.getElementById('user-id').textContent = empId;
        document.getElementById('dept-name').textContent = deptname;

        // 全局状态
        let currentSession = null;
        let ws = null;
        let sessions = [];

        // DOM元素
        const sessionListEl = document.getElementById('session-list');
        const messageListEl = document.getElementById('message-list');
        const emptyStateEl = document.getElementById('empty-state');
        const messageInputEl = document.getElementById('message-input');
        const sendBtnEl = document.getElementById('send-btn');
        const newChatBtnEl = document.getElementById('new-chat');
        const sessionTitleEl = document.getElementById('session-title');
        const clearChatBtnEl = document.getElementById('clear-chat');
        const statusEl = document.getElementById('status');

        // 删除会话
        async function deleteSession(sessionId, event) {
            if (event) {
                event.stopPropagation();
            }
            if (!confirm('确定删除？')) return;

            try {
                await fetch(`/api/sessions/${sessionId}?empId=${empId}`, { method: 'DELETE' });
                await loadSessions();
                if (currentSession && currentSession.session_id === sessionId) {
                    currentSession = null;
                    sessionTitleEl.textContent = '';
                    clearMessages();
                    clearChatBtnEl.disabled = true;
                    emptyStateEl.classList.remove('hidden');
                    messageListEl.classList.add('hidden');
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        // 加载会话列表
        async function loadSessions() {
            try {
                const res = await fetch(`/api/sessions?empId=${empId}`);
                const data = await res.json();
                sessions = data.sessions || [];
                renderSessions();
            } catch (e) {
                console.error('加载会话失败:', e);
                sessionListEl.innerHTML = `<div class="text-center text-red-500 text-sm mt-4">加载失败: ${e.message}</div>`;
            }
        }

        // 渲染会话列表
        function renderSessions() {
            if (sessions.length === 0) {
                sessionListEl.innerHTML = '<div class="text-center text-gray-500 text-sm mt-4">暂无会话</div>';
                return;
            }

            // 按时间倒序
            sessions.sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));

            sessionListEl.innerHTML = sessions.map(s => `
                <div class="session-item px-2 py-0-5 rounded mb-1 hover:bg-gray-100 cursor-pointer group flex items-center justify-between ${s.session_id === currentSession?.session_id ? 'bg-blue-50 text-blue-600' : ''}" data-id="${s.session_id}">
                    <div class="truncate text-sm flex-1 min-w-0">${escapeHtml(s.name)}</div>
                    <button class="delete-btn opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 p-1 transition-opacity" data-id="${s.session_id}" title="删除会话">
                        <span style="font-size:12px;">[×]</span>
                    </button>
                </div>
            `).join('');

            // 绑定点击事件
            document.querySelectorAll('.session-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (!e.target.closest('.delete-btn')) {
                        selectSession(el.dataset.id);
                    }
                });
            });

            // 绑定删除按钮事件
            document.querySelectorAll('.delete-btn').forEach(el => {
                el.addEventListener('click', (e) => deleteSession(el.dataset.id, e));
            });
        }

        // 选择会话
        async function selectSession(sessionId) {
            currentSession = sessions.find(s => s.session_id === sessionId);
            if (!currentSession) return;

            sessionTitleEl.textContent = currentSession.name;
            renderSessions();
            clearMessages();

            // 显示消息区域
            emptyStateEl.classList.add('hidden');
            messageListEl.classList.remove('hidden');

            // 启用按钮
            clearChatBtnEl.disabled = false;

            // 加载历史消息
            try {
                const res = await fetch(`/api/sessions/${sessionId}/messages?empId=${empId}`);
                const data = await res.json();
                const messages = data.messages || [];
                messages.forEach(msg => addMessage(msg.role, msg.content));
            } catch (e) {
                console.error('加载历史消息失败:', e);
            }
        }

        // 新建会话
        newChatBtnEl.addEventListener('click', async () => {
            try {
                const res = await fetch(`/api/sessions?empId=${empId}&name=新对话`, { method: 'POST' });
                const data = await res.json();
                await loadSessions();
                selectSession(data.session.session_id);
            } catch (e) {
                alert('新建会话失败: ' + e.message);
            }
        });

        // 清空聊天
        clearChatBtnEl.addEventListener('click', () => {
            if (confirm('确定清空？')) {
                clearMessages();
            }
        });

        // 发送消息
        async function sendMessage() {
            const content = messageInputEl.value.trim();
            if (!content || !ws || ws.readyState !== WebSocket.OPEN) return;

            // 如果没有选中会话，先新建
            if (!currentSession) {
                try {
                    const res = await fetch(`/api/sessions?empId=${empId}&name=新对话`, { method: 'POST' });
                    const data = await res.json();
                    await loadSessions();
                    currentSession = data.session;
                    sessionTitleEl.textContent = currentSession.name;
                    renderSessions();

                    // 显示消息区域
                    emptyStateEl.classList.add('hidden');
                    messageListEl.classList.remove('hidden');

                    // 启用按钮
                    clearChatBtnEl.disabled = false;
                } catch (e) {
                    alert('新建会话失败: ' + e.message);
                    return;
                }
            }

            // 如果是"新对话"，用第一句消息重命名
            if (currentSession.name === '新对话' || currentSession.name === 'New Chat') {
                const newName = content.length > 15 ? content.substring(0, 15) + '...' : content;
                await fetch(`/api/sessions/${currentSession.session_id}?empId=${empId}&name=${encodeURIComponent(newName)}`, { method: 'PUT' });
                currentSession.name = newName;
                sessionTitleEl.textContent = newName;
                renderSessions();
            }

            // 添加用户消息
            addMessage('user', content);
            messageInputEl.value = '';

            // 显示打字动画
            addTyping();

            // 发送消息
            ws.send(JSON.stringify({
                type: 'message',
                data: { content, session_id: currentSession.session_id }
            }));
        }

        // 添加消息
        function addMessage(role, content) {
            const isUser = role === 'user';
            const el = document.createElement('div');
            el.className = 'flex items-start gap-3 mb-6';

            let messageContent;
            if (isUser) {
                messageContent = `<div class="whitespace-pre-wrap">${escapeHtml(content)}</div>`;
            } else {
                messageContent = `<div class="prose">${marked.parse(content)}</div>`;
            }

            el.innerHTML = `
                <div class="w-8 h-8 rounded-full ${isUser ? 'bg-green-600' : 'bg-blue-600'} flex items-center justify-center text-white shrink-0">
                    <span>${isUser ? '👤' : '🤖'}</span>
                </div>
                <div class="${isUser ? 'bg-blue-50' : 'bg-white'} rounded-lg ${isUser ? 'rounded-tr-none' : 'rounded-tl-none'} shadow-sm p-4 max-w-[90%]">
                    ${messageContent}
                </div>
            `;
            messageListEl.appendChild(el);
            scrollToBottom();
        }

        // 添加打字动画
        function addTyping() {
            const el = document.createElement('div');
            el.className = 'typing flex items-start gap-3 mb-6';
            el.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white shrink-0">
                    <span>🤖</span>
                </div>
                <div class="bg-white rounded-lg rounded-tl-none shadow-sm p-4">
                    <div class="typing-animation">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            `;
            messageListEl.appendChild(el);
            scrollToBottom();
        }

        // 移除打字动画
        function removeTyping() {
            const el = document.querySelector('.typing');
            if (el) el.remove();
        }

        // 清空消息
        function clearMessages() {
            messageListEl.innerHTML = '';
        }

        // 滚动到底部
        function scrollToBottom() {
            const container = document.getElementById('message-container');
            container.scrollTop = container.scrollHeight;
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 连接WebSocket
        function connectWs() {
            statusEl.innerHTML = '<span style="color:#eab308;">●</span> 连接中...';
            ws = new WebSocket(`ws://${window.location.host}/ws?empId=${empId}&deptname=${encodeURIComponent(deptname)}`);

            ws.onopen = () => {
                statusEl.innerHTML = '<span style="color:#22c55e;">●</span> 已连接';
            };

            ws.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                if (msg.type === 'message') {
                    const { content, is_progress, session_id } = msg.data;

                    // 只处理当前会话的消息
                    if (!currentSession || session_id !== currentSession.session_id) {
                        // 如果不是当前会话的消息，忽略（不显示，但也不丢失，等用户切回该会话时会从历史记录加载
                        return;
                    }

                    if (is_progress) {
                        // 流式响应
                        const typing = document.querySelector('.typing');
                        if (typing) {
                            typing.querySelector('.typing-animation').remove();
                            typing.querySelector('div:nth-child(2)').innerHTML = `<div class="prose">${marked.parse(content)}</div>`;
                            scrollToBottom();
                        }
                    } else {
                        // 完整消息
                        removeTyping();
                        addMessage('assistant', content);
                    }
                }
            };

            ws.onerror = () => {
                statusEl.innerHTML = '<span style="color:#ef4444;">●</span> 连接错误';
            };

            ws.onclose = () => {
                statusEl.innerHTML = '<span style="color:#ef4444;">●</span> 已断开';
                setTimeout(connectWs, 3000);
            };
        }

        // 绑定事件
        sendBtnEl.addEventListener('click', sendMessage);
        messageInputEl.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 初始化
        loadSessions();
        connectWs();

        // 加载动画CSS
        const style = document.createElement('style');
        style.textContent = `
            .hidden { display: none !important; }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
